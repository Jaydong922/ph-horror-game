<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sa Lilim ng Lumang Bahay</title>
<style>
*{margin:0;padding:0;overflow:hidden;background:#000}
canvas{display:block}
.ui{position:absolute;top:10px;left:10px;color:#7dd3fc;font-family:Orbitron,sans-serif;font-size:14px;text-shadow:0 0 5px #0ea5e9;z-index:10}
</style>
</head>
<body>
<div class="ui">🏚️ SA LILIM NG LUMANG BAHAY | GAMITIN ANG DALIRI PARA LUMIPAT</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>
// SETUP
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101015); // Medyo mas maliwanag na itim
scene.fog = new THREE.Fog(0x101015, 3, 20); // Hamog na hindi sobrang dilim

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// GROUND
const groundGeo = new THREE.PlaneGeometry(30,30);
const groundMat = new THREE.MeshStandardMaterial({color:0x252525, roughness:0.9});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// MGA DINGDING (Makikita mo na agad)
const wallMat = new THREE.MeshStandardMaterial({color:0x3a3a40});
function makeWall(x,z,w,h){
  const wl = new THREE.Mesh(new THREE.BoxGeometry(w,h,1), wallMat);
  wl.position.set(x,h/2,z);
  scene.add(wl);
}
makeWall(-15,0,1,7); makeWall(15,0,1,7);
makeWall(0,-15,30,7); makeWall(0,15,30,7);

// ILaw (Mas malakas para makita ang paligid)
const light = new THREE.PointLight(0x4466aa, 0.7, 25);
light.position.set(0, 3, 0);
light.castShadow = true;
scene.add(light);

// GALAW NG TAO
let move = {f:false,b:false};
let vel = 0.08;
let pos = {x:0,z:6};

document.addEventListener('touchstart', e=>{
  const x = e.touches[0].clientX;
  move.f = x > window.innerWidth/2;
  move.b = x < window.innerWidth/2;
});
document.addEventListener('touchend', ()=>{move.f=move.b=false});

// ANIMATION LOOP
function animate(){
  requestAnimationFrame(animate);
  if(move.f) pos.z -= vel;
  if(move.b) pos.z += vel;
  camera.position.set(pos.x, 1.7, pos.z);
  camera.rotation.y = 0;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
