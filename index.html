<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sa Lilim ng Lumang Bahay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron,sans-serif}
body{background:#101018;color:#7dd3fc;overflow:hidden}
.screen{width:100vw;height:100vh;position:relative}
.room{width:100%;height:100%;background:linear-gradient(#1a1a28,#080810);border:8px solid #252540;display:flex;align-items:center;justify-content:center}
.text{font-size:clamp(1.5rem,5vw,2.5rem);text-shadow:0 0 15px #0ea5e9;text-align:center;padding:2rem}
.controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:1rem}
.btn{background:rgba(14,165,233,.2);border:2px solid #0ea5e9;color:#7dd3fc;padding:1rem 2rem;font-size:1rem;border-radius:4px;cursor:pointer}
</style>
</head>
<body>

<div class="screen">
  <div class="room">
    <div class="text">🏚️ SA LILIM NG LUMANG BAHAY<br><br>GUMAGANA NA!<br>KANAN = USAD | KALIWA = ATAS</div>
  </div>
  <div class="controls">
    <button class="btn" id="left">⬅️ KALIWA</button>
    <button class="btn" id="right">➡️ KANAN</button>
  </div>
</div>

<script>
let pos = 50;
const room = document.querySelector('.room');

document.getElementById('left').addEventListener('touchstart', ()=>{
  if(pos > 10) pos -= 5;
  room.style.backgroundPosition = `${pos}% 50%`;
});

document.getElementById('right').addEventListener('touchstart', ()=>{
  if(pos < 90) pos += 5;
  room.style.backgroundPosition = `${pos}% 50%`;
});

document.addEventListener('touchstart', e=>{
  const x = e.touches[0].clientX;
  if(x > window.innerWidth/2 && pos < 90) pos += 5;
  if(x < window.innerWidth/2 && pos > 10) pos -= 5;
  room.style.backgroundPosition = `${pos}% 50%`;
});
</script>

</body>
</html>
