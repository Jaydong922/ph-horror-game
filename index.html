<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sa Lilim ng Lumang Bahay</title>
<style>
*{margin:0;padding:0;overflow:hidden;background:#000}
canvas{display:block}
.ui{position:absolute;top:10px;left:10px;color:#7dd3fc;font-family:Orbitron,sans-serif;font-size:14px;text-shadow:0 0 5px #0ea5e9;z-index:10}
</style>
</head>
<body>
<div class="ui">🏚️ SA LILIM NG LUMANG BAHAY | GAMITIN ANG DALIRI PARA LUMIPAT</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// SETUP
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a); // Sobrang dilim
scene.fog = new THREE.Fog(0x0a0a0a, 2, 18); // Parang may hamog

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(25,25),
  new THREE.MeshStandardMaterial({color:0x181818, roughness:0.8})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// DILIM AT ILaw
const light = new THREE.PointLight(0x223355, 0.25, 12);
light.position.set(0, 2.2, 0);
scene.add(light);

// KWARTO
const wallMat = new THREE.MeshStandardMaterial({color:0x2c2c2c});
function makeWall(x,z,w,h){
  const wl = new THREE.Mesh(new THREE.BoxGeometry(w,h,1), wallMat);
  wl.position.set(x,h/2,z);
  scene.add(wl);
}
makeWall(-12,0,1,6); makeWall(12,0,1,6);
makeWall(0,-12,24,6); makeWall(0,12,24,6);

// GALAW NG TAO
let move = {f:false,b:false,l:false,r:false};
let vel = 0.07;
let pos = {x:0,z:4};

document.addEventListener('touchstart', e=>{
  const x = e.touches[0].clientX;
  move.f = x > window.innerWidth/2;
  move.b = x < window.innerWidth/2;
});
document.addEventListener('touchend', ()=>{move.f=move.b=false});

// I-UPDATE
function animate(){
  requestAnimationFrame(animate);
  if(move.f) pos.z -= vel;
  if(move.b) pos.z += vel;
  camera.position.set(pos.x, 1.7, pos.z);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
